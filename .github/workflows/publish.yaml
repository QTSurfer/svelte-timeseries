name: Publish Monorepo to npmjs.com

on:
  push:
    branches: [ main ]

jobs:
  publish:
    if: github.repository == 'QTSurfer/svelte-timeseries'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v4
        with:
          run_install: false

      - uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
          cache: pnpm
          registry-url: "https://registry.npmjs.org/"

      - name: Install Dependencies
        run: pnpm ci:install

      - name: Run build
        run: pnpm build

      - name: Check typings in All Packages
        run: pnpm check

      - name: Publish to npm (if unpublished versions exist)
        run: pnpm changeset:publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_CONFIG_PROVENANCE: true

      - name: Create GitHub Release
        if: success()
        run: |
          VERSION=$(node -p "require('./packages/svelte-timeseries/package.json').version")
          CURRENT_TAG="v${VERSION}"
          if ! git tag -l "$CURRENT_TAG" | grep -q .; then
            git tag "$CURRENT_TAG"
            git push origin "$CURRENT_TAG"

            # Extract release notes from CHANGELOG.md (current version section)
            NOTES=$(awk '/^## '"$VERSION"'/{found=1; next} /^## [0-9]/{if(found) exit} found{print}' packages/svelte-timeseries/CHANGELOG.md)

            BODY="## @qtsurfer/svelte-timeseries@${VERSION}

            ${NOTES}

            ---

            **npm:** [\`@qtsurfer/svelte-timeseries@${VERSION}\`](https://www.npmjs.com/package/@qtsurfer/svelte-timeseries/v/${VERSION}) | [\`@qtsurfer/sveltecharts@${VERSION}\`](https://www.npmjs.com/package/@qtsurfer/sveltecharts/v/${VERSION})
            **Install:** \`pnpm add @qtsurfer/svelte-timeseries@${VERSION}\`"

            gh release create "$CURRENT_TAG" --title "$CURRENT_TAG" --notes "$BODY" || echo "Release already exists"
          else
            echo "Tag $CURRENT_TAG already exists, skipping release"
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
